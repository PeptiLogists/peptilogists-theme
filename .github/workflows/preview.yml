name: Shopify Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Set Preview Theme Name
        id: vars
        run: |
          echo "THEME_NAME=PR-${{ github.event.number }}" >> $GITHUB_ENV

      # 🔥 CREATE / UPDATE PREVIEW THEME
      - name: Deploy Preview Theme
        if: github.event.action != 'closed'
        run: |
          shopify theme push \
            --store $SHOPIFY_STORE \
            --password $SHOPIFY_PASSWORD \
            --unpublished \
            --theme-name "$THEME_NAME"
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_PASSWORD: ${{ secrets.SHOPIFY_PASSWORD }}

      # 🧹 DELETE PREVIEW THEME ON CLOSE
      - name: Delete Preview Theme
        if: github.event.action == 'closed'
        run: |
          THEME_ID=$(shopify theme list --store $SHOPIFY_STORE --password $SHOPIFY_PASSWORD | grep "$THEME_NAME" | awk '{print $1}')
          if [ -n "$THEME_ID" ]; then
            shopify theme delete $THEME_ID --force \
              --store $SHOPIFY_STORE \
              --password $SHOPIFY_PASSWORD
          fi
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_PASSWORD: ${{ secrets.SHOPIFY_PASSWORD }}
