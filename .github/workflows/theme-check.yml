name: Shopify Theme Check CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  theme-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2

      - run: gem install theme-check
      - run: theme-check
