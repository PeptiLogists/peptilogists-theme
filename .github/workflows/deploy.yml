name: Shopify Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Shopify CLI
        run: |
          npm install -g @shopify/cli @shopify/theme

      - name: Deploy Theme to Shopify
        if: github.ref == 'refs/heads/main'
        run: |
          shopify theme push --store $SHOPIFY_STORE --password $SHOPIFY_PASSWORD --theme $SHOPIFY_THEME_ID --allow-live
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_PASSWORD: ${{ secrets.SHOPIFY_PASSWORD }}
          SHOPIFY_THEME_ID: ${{ secrets.SHOPIFY_THEME_ID }}

      - name: Deploy DEV Theme to Shopify
        if: github.ref == 'refs/heads/dev'
        run: |
          shopify theme push --store $SHOPIFY_STORE --password $SHOPIFY_PASSWORD --theme $SHOPIFY_THEME_ID_DEV
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_PASSWORD: ${{ secrets.SHOPIFY_PASSWORD }}
          SHOPIFY_THEME_ID_DEV: ${{ secrets.SHOPIFY_THEME_ID_DEV }}
